<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Peta Desa SEA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= LEAFLET CSS ================= -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.6/dist/leaflet-search.min.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
}

/* ================= MAP ================= */
#map {
    width: 100%;
    height: 100vh;
}

/* ================= INFO BUTTON (KANAN TENGAH) ================= */
.info-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1000;
    padding: 10px 18px;
    background: linear-gradient(135deg, #1b5e20, #66bb6a);
    color: #fff;
    border: none;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
}

/* ================= POPUP OVERLAY ================= */
#infoPopup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

/* ================= POPUP CONTENT ================= */
.popup-content {
    width: 360px;
    padding: 22px;
    border-radius: 18px;
    background: linear-gradient(135deg, #1b5e20, #4caf50);
    color: #fff;
    box-shadow: 0 25px 45px rgba(0,0,0,0.4);
    animation: popupFade 0.35s ease;
}

.popup-content h3 {
    margin: 0 0 14px;
    text-align: center;
    font-weight: bold;
}

.popup-content table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    overflow: hidden;
}

.popup-content th,
.popup-content td {
    padding: 9px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.25);
}

.popup-content th {
    text-align: left;
    width: 35%;
}

.popup-content tr:last-child td,
.popup-content tr:last-child th {
    border-bottom: none;
}

/* ================= CLOSE BUTTON ================= */
.popup-close {
    margin-top: 16px;
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 10px;
    background: #e8f5e9;
    color: #1b5e20;
    font-weight: bold;
    cursor: pointer;
}

.popup-close:hover {
    background: #c8e6c9;
}

/* ================= ANIMATION ================= */
@keyframes popupFade {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* ================= LEGEND ================= */
.info.legend {
    background: white;
    padding: 8px;
    font-size: 12px;
    line-height: 18px;
}

.info.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- ================= MAP ================= -->
<div id="map"></div>

<!-- ================= INFO BUTTON ================= -->
<button class="info-btn" onclick="openInfo()">Info</button>

<!-- ================= POPUP INFO ================= -->
<div id="infoPopup">
    <div class="popup-content">
        <h3>Informasi Mahasiswa</h3>
        <table>
            <tr><th>Nama</th><td>Edward Gabriel Alexandro Tatambihe</td></tr>
            <tr><th>NIM</th><td>241011060031</td></tr>
            <tr><th>Kelas</th><td>Sistem Informasi - B</td></tr>
        </table>
        <button class="popup-close" onclick="closeInfo()">Tutup</button>
    </div>
</div>

<!-- ================= LIBRARY JS ================= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-hash@0.2.1/leaflet-hash.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.6/dist/leaflet-search.min.js"></script>

<!-- ================= DATA GEOJSON ================= -->
<script src="PETADESASEA_1.js"></script>

<script>
/* ================= POPUP CONTROL ================= */
function openInfo() {
    document.getElementById('infoPopup').style.display = 'flex';
}
function closeInfo() {
    document.getElementById('infoPopup').style.display = 'none';
}

/* ================= INIT MAP ================= */
var map = L.map('map', {
    zoomControl: false,
    maxZoom: 28,
    minZoom: 1
}).fitBounds([
    [1.330972688364832, 124.686201443043],
    [1.482565263659733, 124.89493275825676]
]);

new L.Hash(map);
L.control.zoom({ position: 'topleft' }).addTo(map);

/* ================= BASEMAP ================= */
var layer_OSM = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 19 }
);

var layer_GoogleSatellite = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
    { maxZoom: 28, maxNativeZoom: 20 }
).addTo(map);

/* ================= COLOR FUNCTION ================= */
function getColor(luas) {
    return luas > 1000 ? '#1b5e20' :
           luas > 500  ? '#388e3c' :
           luas > 100  ? '#66bb6a' :
                         '#a5d6a7';
}

/* ================= POPUP DESA ================= */
function popDesa(feature, layer) {
    layer.bindPopup(`
        <table>
            <tr><th>Nama Desa</th><td>${feature.properties.NAMOBJ ?? ''}</td></tr>
            <tr><th>Kecamatan</th><td>${feature.properties.WADMKC ?? ''}</td></tr>
            <tr><th>Kabupaten</th><td>${feature.properties.WADMKD ?? ''}</td></tr>
            <tr><th>Luas (Ha)</th><td>${feature.properties.LUAS ?? ''}</td></tr>
        </table>
    `);

    layer.bindTooltip(feature.properties.NAMOBJ, { sticky: true });

    layer.on({
        click: () => map.fitBounds(layer.getBounds()),
        mouseover: e => e.target.setStyle({ weight: 3, color: '#1b5e20' }),
        mouseout: e => desaLayer.resetStyle(e.target)
    });
}

/* ================= STYLE ================= */
function styleDesa(feature) {
    return {
        color: '#1b5e20',
        weight: 1,
        fillColor: getColor(feature.properties.LUAS),
        fillOpacity: 0.8
    };
}

/* ================= GEOJSON ================= */
var desaLayer = L.geoJSON(json_PETADESASEA_1, {
    style: styleDesa,
    onEachFeature: popDesa
}).addTo(map);

/* ================= LAYER CONTROL ================= */
L.control.layers(
    {
        "Google Satellite": layer_GoogleSatellite,
        "OpenStreetMap": layer_OSM
    },
    {
        "Batas Desa SEA": desaLayer
    }
).addTo(map);

/* ================= SEARCH ================= */
L.control.search({
    layer: desaLayer,
    propertyName: 'NAMOBJ',
    marker: false,
    moveToLocation: latlng => map.setView(latlng, 16)
}).addTo(map);

/* ================= GEOLOCATION ================= */
map.locate({ setView: true, maxZoom: 16 });

/* ================= LEGEND ================= */
var legend = L.control({ position: 'bottomright' });
legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'info legend');
    div.innerHTML =
        '<b>Luas Wilayah (Ha)</b><br>' +
        '<i style="background:#1b5e20"></i> > 1000<br>' +
        '<i style="background:#388e3c"></i> 501 – 1000<br>' +
        '<i style="background:#66bb6a"></i> 101 – 500<br>' +
        '<i style="background:#a5d6a7"></i> ≤ 100';
    return div;
};
legend.addTo(map);
</script>

</body>
</html>
